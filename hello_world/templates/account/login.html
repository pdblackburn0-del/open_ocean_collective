{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Log In{% endblock %}

{% block extra_css %}
<style>
    .auth-hero {
        /* 👇 Leave space for your background image here */
        background: url("https://res.cloudinary.com/dwe00uiuy/image/upload/v1771811712/IMG_6533_3_l3v9ti.jpg") no-repeat center center/cover;
        height: 100vh;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
    }

    .auth-card {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 500px;
        border-radius: 20px;
        backdrop-filter: blur(6px);
        background: rgba(255, 255, 255, 0.95);
    }

    .auth-card h2 {
        font-family: 'Radley', serif;
        font-size: 2rem;
    }

    .auth-btn {
        border-radius: 50px;
        padding: 14px;
        font-weight: 600;
        font-family: 'Radley', serif;
        font-size: 1.1rem;
    }

    @media (max-width: 768px) {
        .auth-card {
            margin: 20px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-hero">
    <div class="auth-overlay"></div>

    <div class="card auth-card shadow-lg p-4">
        <h2 class="text-center mb-4">Welcome Back</h2>

        <form method="post" action="{% url 'account_login' %}">
            {% csrf_token %}
            {{ form|crispy }}

            <button type="submit" class="btn btn-primary w-100 mt-3 auth-btn">
                Log In
            </button>
        </form>

        <p class="text-center mt-3">
            Don’t have an account?
            <a href="{% url 'account_signup' %}">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
