{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Open Ocean Collective</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Open Ocean Collective - Encouraging diversity in British Surfing">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Estonia&family=Quintessential&family=Radley:ital@0;1&family=Texturina:ital,opsz,wght@0,12..72,100..900;1,12..72,100..900&display=swap');
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Helvetica Neue', sans-serif;
        }

        .hero {
            background: url("https://res.cloudinary.com/dwe00uiuy/image/upload/v1772192573/Adobe_Express_-_file_npcrev.jpg") no-repeat center center/cover;
            min-height: 100vh;
            position: relative;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            text-align: center;
            color: white;
            padding-top: 10px; /* Adjust this value to position the content lower */
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 20px;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .hero p {
            font-family: 'Estonia', cursive;
            font-size: 3rem;
            margin-bottom: 40px;
            color: whitesmoke;
        }

       .btn-cta {
        margin: 10px;
        padding: 14px 40px; /* slightly wider for surfboard feel */
        font-weight: 600;
        border-radius: 50px; /* makes buttons oval */
        transition: all 0.3s ease;
        font-family: 'Radley', serif;
        color: lightblue;
        font-size: 1.3rem;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
            
        }
        /* Mobile-specific background image for better performance and aesthetics */
        @media (max-width: 768px) {
    .hero {
        background: url("https://res.cloudinary.com/dwe00uiuy/image/upload/v1772193047/Screenshot_2026-02-27_at_11.50.06_tscrkv.png") 
        no-repeat center center/cover;
    }
}
        .hero-logo{
        max-width: 450px;   
        height: auto;
        }
        .enter-btn {
        font-size: 1.5rem;   /* 1.3rem × 1.5 */
        padding: 20px 60px;   /* larger surfboard shape */
        }
        .auth-buttons {
        margin-top: 60px;  /* pushes them further down */
        }
     
    </style>
</head>

<body>

<section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <h1>
    <img src="https://res.cloudinary.com/dwe00uiuy/image/upload/v1771791473/logo-white_f2ir1v.png"
         alt="Open Ocean Collective Logo"
         class="hero-logo">
    </h1>
        <p>Championing diversity in British surfing</p>
        <div>
    <a href="{% url 'hello_world:homepage' %}" class="btn btn-dark btn-cta enter-btn">Enter Site</a>

    </a>
    </div>
   <div class="auth-buttons">
    <a href="{% url 'account_signup' %}" class="btn btn-outline-light btn-cta">
        Sign Up
    </a>

    <a href="{% url 'account_login' %}" class="btn btn-outline-light btn-cta">
        Log In
    </a>
    </div>
    </div>
</section>

</body>
</html>
